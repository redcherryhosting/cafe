<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espresso Yourself Cafè</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #150f0a;
            color: #f3edd7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .card {
            background-color: #241910;
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 360px;
            width: 100%;
            border: 1px solid #3d2b1c;
        }
        .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        h1 { 
            font-size: 24px; 
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p { 
            color: #bfae99; 
            margin: 0 0 25px 0; 
            font-size: 15px; 
            line-height: 1.5; 
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #3d2b1c;
            border-radius: 8px;
            background-color: #150f0a;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 2px;
        }
        input:focus { 
            border-color: #a37652; 
            outline: none; 
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #a37652;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background-color: #bc8961; }
        button:active { transform: scale(0.98); }
        .error { 
            color: #ff6b6b; 
            margin-top: 15px; 
            font-size: 14px; 
            display: none; 
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">☕</div>
    <h1>Cafe Portal Locked</h1>
    <p>Take a mandatory shot with the bartender to receive the secret password and unlock the menu.</p>
    
    <input type="text" id="secretKey" placeholder="ENTER PASSWORD" autocomplete="off" spellcheck="false">
    <button onclick="checkKey()">Unlock Menu</button>
    <div id="errorMsg" class="error">❌ Incorrect key. Management is watching.</div>
</div>

<script>
    function checkKey() {
        const input = document.getElementById('secretKey').value.trim().toLowerCase();
        const errorMsg = document.getElementById('errorMsg');
        
        // 1. CHANGE THIS TO YOUR SECRET PASSWORD
        const correctKey = "espresso"; 
        
        // 2. CHANGE THIS TO YOUR ACTUAL MENU LINK (Canva, PDF, etc.)
        const menuUrl = "https://www.canva.com/your-actual-menu-link-here";

        if (input === correctKey) {
            errorMsg.style.display = "none";
            window.location.href = menuUrl;
        } else {
            errorMsg.style.display = "block";
            // Simple haptic shake effect styling can go here if desired
        }
    }

    // Handle Enter Key
    document.getElementById('secretKey').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { checkKey(); }
    });
</script>

</body>
</html>
